apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: remedy
  labels:
    app: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: thisaru01/remedy-ai-service:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: remedy-env
                  key: AI_MONGO_URI
          envFrom:
            - secretRef:
                name: remedy-env
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: remedy
spec:
  type: ClusterIP
  selector:
    app: ai-service
  ports:
    - name: http
      port: 5000
      targetPort: 5000
