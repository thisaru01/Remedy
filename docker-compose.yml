services:
  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: remedy-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    depends_on:
      - gateway
    ports:
      - "5173:5173"

  gateway:
    build:
      context: ./gateway
    container_name: remedy-gateway
    restart: unless-stopped
    environment:
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token_change_me}
      AUTH_SERVICE_URL: http://auth-service:5000
      PATIENT_SERVICE_URL: http://patient-service:5000
      DOCTOR_SERVICE_URL: http://doctor-service:5000
      APPOINTMENT_SERVICE_URL: http://appointment-service:5000
      PAYMENT_SERVICE_URL: http://payment-service:5000
      TELEMEDICINE_SERVICE_URL: http://telemedicine-service:5000
      AI_SERVICE_URL: http://ai-service:5000
    depends_on:
      - auth-service
      - patient-service
      - doctor-service
      - appointment-service
      - payment-service
      - telemedicine-service
    ports:
      - "8080:8080"

  auth-service:
    build:
      context: ./services/auth-service
    container_name: remedy-auth-service
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: ${AUTH_MONGO_URI:?AUTH_MONGO_URI is required}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      JWT_EXPIRE: ${JWT_EXPIRE:-1d}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token_change_me}
      PATIENT_SERVICE_URL: http://patient-service:5000
      DOCTOR_SERVICE_URL: http://doctor-service:5000
    depends_on:
      - patient-service
      - doctor-service
    ports:
      - "5000:5000"

  patient-service:
    build:
      context: ./services/patient-service
    container_name: remedy-patient-service
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: ${PATIENT_MONGO_URI:?PATIENT_MONGO_URI is required}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token_change_me}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:?CLOUDINARY_CLOUD_NAME is required}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:?CLOUDINARY_API_KEY is required}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:?CLOUDINARY_API_SECRET is required}
    ports:
      - "5001:5000"

  doctor-service:
    build:
      context: ./services/doctor-service
    container_name: remedy-doctor-service
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: ${DOCTOR_MONGO_URI:?DOCTOR_MONGO_URI is required}
      AUTH_MONGO_URI: ${AUTH_MONGO_URI:?AUTH_MONGO_URI is required}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token_change_me}
    ports:
      - "5002:5000"

  appointment-service:
    build:
      context: ./services/appointment-service
    container_name: remedy-appointment-service
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: ${APPOINTMENT_MONGO_URI:?APPOINTMENT_MONGO_URI is required}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token_change_me}
      DOCTOR_SERVICE_URL: ${DOCTOR_SERVICE_URL:-http://doctor-service:5000}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:5000}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://notification-service:5007}
      NOTIFICATION_SERVICE_TIMEOUT_MS: 10000
    ports:
      - "5003:5000"

  telemedicine-service:
    build:
      context: ./services/telemedicine-service
    container_name: remedy-telemedicine-service
    restart: unless-stopped
    depends_on:
      - appointment-service
    environment:
      PORT: 5000
      MONGO_URI: ${TELEMEDICINE_MONGO_URI:?TELEMEDICINE_MONGO_URI is required}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token_change_me}
      APPOINTMENT_SERVICE_URL: http://appointment-service:5000
      JAAS_TOKEN_EXPIRES_IN: ${JAAS_TOKEN_EXPIRES_IN:-365d}
      SKIP_APPOINTMENT_VALIDATION: ${SKIP_APPOINTMENT_VALIDATION:-false}
      JAAS_ENABLED: ${JAAS_ENABLED:-false}
      JAAS_DOMAIN: ${JAAS_DOMAIN:-8x8.vc}
      JAAS_APP_ID: ${JAAS_APP_ID}
      JAAS_KEY_ID: ${JAAS_KEY_ID}
      JAAS_PRIVATE_KEY: ${JAAS_PRIVATE_KEY}
    ports:
      - "5004:5000"

  admin-service:
    build:
      context: ./services/admin-service
    container_name: remedy-admin-service
    restart: unless-stopped
    environment:
      PORT: 5000
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token_change_me}
    ports:
      - "5005:5000"

  payment-service:
    build:
      context: ./services/payment-service
    container_name: remedy-payment-service
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: ${PAYMENT_MONGO_URI:?PAYMENT_MONGO_URI is required}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token_change_me}
      APPOINTMENT_SERVICE_URL: ${APPOINTMENT_SERVICE_URL:-http://appointment-service:5000}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-http://localhost:5173/patient/payments/success}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-http://localhost:5173/patient/payments/cancel}
    depends_on:
      - appointment-service
    ports:
      - "5006:5000"

  notification-service:
    build:
      context: ./services/notification-service
    container_name: remedy-notification-service
    restart: unless-stopped
    environment:
      PORT: 5007
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token_change_me}
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
    ports:
      - "5007:5007"

  ai-service:
    build:
      context: ./services/ai-service
    container_name: remedy-ai-service
    restart: unless-stopped
    environment:
      PORT: 5000
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token_change_me}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    ports:
      - "5008:5000"
